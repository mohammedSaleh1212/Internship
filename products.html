<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Products — Mohammed Saleh</title>
    <script src="js/theme-init.js"></script>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet" />

    <link rel="stylesheet" href="css/styles.css" />
  </head>

  <body>

    <nav id="mainNav" class="navbar navbar-expand-md fixed-top custom-nav">
      <div class="container">
        <a class="navbar-brand fw-bold text-gradient-primary" href="index.html">
          Mohammed Saleh
        </a>

        <div class="d-none d-md-flex gap-4 align-items-center">
          <a class="nav-link" href="portfolio.html">Portfolio</a>
          <a class="nav-link" href="blog.html">Blog</a>
          <a class="nav-link active" href="products.html">Products</a>
          <a class="nav-link" href="calculator.html">Calculator</a>
          <a class="nav-link" href="consultation.html">Contact</a>
        </div>

        <div class="d-none d-md-flex gap-2">
          <button
            class="btn social-link border-0 p-2 theme-toggle-btn btn-outline-modern"
            aria-label="Toggle Theme">
            <i class="bi bi-moon-stars fs-5 theme-toggle-icon"></i>
          </button>
        </div>

        <button class="btn d-md-none" type="button" data-bs-toggle="offcanvas"
          data-bs-target="#mobileMenu">
          <i class="bi bi-list fs-3"></i>
        </button>
      </div>
    </nav>

    <div class="offcanvas offcanvas-start" tabindex="-1" id="mobileMenu">
      <div class="offcanvas-header">
        <h5 class="offcanvas-title fw-bold">Menu</h5>
        <button type="button" class="btn-close"
          data-bs-dismiss="offcanvas"></button>
      </div>
      <div class="offcanvas-body d-flex flex-column gap-3">
        <a href="portfolio.html" class="text-decoration-none">Portfolio</a>
        <a href="blog.html" class="text-decoration-none">Blog</a>
        <a href="products.html"
          class="text-decoration-none fw-bold">Products</a>
        <a href="calculator.html" class="text-decoration-none">Calculator</a>
        <a href="consultation.html" class="text-decoration-none">Contact</a>
        <hr />
        <button class="btn social-link border-0 p-2 theme-toggle-btn"
          aria-label="Toggle Theme">
          <i class="bi bi-moon-stars fs-5 theme-toggle-icon"></i>
        </button>
      </div>
    </div>

    <section id="shop-header" >
      <div class="container">
        <div
          class="page-header d-flex flex-wrap align-items-end justify-content-between gap-3 mb-2">
          <div>
            <h1 class="h2 page-title fw-bold mb-2">
              Products
            </h1>
            <p class="text-muted mb-0">
              Hand-picked gear for makers.
            </p>
          </div>

          <div
            class="cart-pill rounded-pill px-4 py-2 fw-medium border d-flex align-items-center gap-2">
            <i class="bi bi-cart3 fs-5"></i>
            <span><span id="cart-count">0</span> items in cart</span>
          </div>

        </div>

      </div>
    </section>

    <section id="shop-grid" class="pt-3">
      <div class="container">

        <div id="loading-spinner" class="text-center py-5">
          <div class="spinner-border text-muted" role="status">
            <span class="visually-hidden">Loading...</span>
          </div>
        </div>

        <div class="row g-4" id="products-container"></div>

      </div>
    </section>

    <footer class="border-top mt-auto">
      <div class="container text-center py-4">
        <small class="text-muted">© 2026 Mohammed Saleh</small>
      </div>
    </footer>

    <div class="toast-container position-fixed bottom-0 end-0 p-3"
      style="z-index: 1055;">
      <div id="cartToast" class="toast align-items-center text-bg-dark border-0"
        role="alert" aria-live="assertive" aria-atomic="true">
        <div class="d-flex">
          <div class="toast-body d-flex align-items-center gap-2">
            <i class="bi bi-check-circle-fill text-primary-modern"></i>
            <span id="toast-message">Item added to cart.</span>
          </div>
          <button type="button" class="btn-close btn-close-white me-2 m-auto"
            data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="js/index.js"></script>
    <script src="js/products.js"></script>
  </body>
</html>
